name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # В GHCR обязательно нужно указывать владельца (repository_owner) перед именем образа
  BACKEND_IMAGE_NAME: ${{ github.repository_owner }}/devopslab5-backend
  DATABASE_IMAGE_NAME: ${{ github.repository_owner }}/devopslab5-database

jobs:
  # Проверка компиляции (работает на PR и Push)
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend (check only)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build DB (check only)
        uses: docker/build-push-action@v5
        with:
          context: ./database # Исправлено: единый путь
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.DATABASE_IMAGE_NAME }}:test # Исправлено: правильное имя переменной
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Пуш образов (только для Push, игнорируем PR)
  push-to-registry:
    needs: build-and-test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- BACKEND ---
      - name: Extract metadata for Backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}
          # Здесь происходит магия разделения: создается тег :dev или :main в зависимости от ветки
          tags: |
            type=ref,event=branch
            type=sha,format=short

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}

      # --- DATABASE ---
      - name: Extract metadata for DB
        id: meta-db
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.DATABASE_IMAGE_NAME }} # Исправлено: правильное имя переменной
          # Здесь происходит магия разделения: создается тег :dev или :main в зависимости от ветки
          tags: |
            type=ref,event=branch
            type=sha,format=short

      - name: Build and push DB image
        uses: docker/build-push-action@v5
        with:
          context: ./database # Исправлено: единый путь
          push: true
          tags: ${{ steps.meta-db.outputs.tags }}
          labels: ${{ steps.meta-db.outputs.labels }}

  # Деплой на DEV (Срабатывает только при пуше в dev)
  deploy-dev:
    needs: push-to-registry
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to DEV Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /path/to/your/project
            docker-compose pull
            docker-compose up -d --remove-orphans

  # Деплой на MAIN (Срабатывает только при пуше в main)
  deploy-main:
    needs: push-to-registry
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to PROD Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /path/to/your/project
            docker-compose pull
            docker-compose up -d --remove-orphans